name: release

# Build and publish to npm when a GitHub Release is published.
# Uses npm Trusted Publishing (OIDC) — no long-lived npm token stored in the
# repo. Configure the trusted publisher for the `crawlsnap` package on
# npmjs.com (Settings → Trusted Publisher → this repo + this workflow file).
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      # Trusted Publishing (OIDC) requires npm >= 11.5.1; setup-node ships an
      # older npm, so upgrade before publishing. Pin to the npm 11 line (rather
      # than @latest, whose engines now demand a newer Node than the runner).
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      # No NODE_AUTH_TOKEN: auth is the OIDC token exchange (id-token: write).
      - run: npm publish --provenance --access public
